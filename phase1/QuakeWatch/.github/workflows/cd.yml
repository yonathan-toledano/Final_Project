name: CD - Docker and Helm Publish

on:
  pull_request:
    types:
      - closed
    branches:
      - main

jobs:
  publish:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    env:
      DOCKER_IMAGE: yonathantoledano/quakewatch

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}

      - name: Set up Helm
        uses: azure/setup-helm@v4.3.0
        with:
          version: latest

      - name: Package Helm chart
        run: |
          mkdir -p dist
          helm lint charts/quakewatch
          helm package charts/quakewatch --destination dist

      - name: Login Helm to Docker Hub OCI registry
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | helm registry login registry-1.docker.io \
            --username "${{ secrets.DOCKERHUB_USERNAME }}" \
            --password-stdin

      - name: Push Helm chart to Docker Hub
        run: |
          helm push dist/quakewatch-*.tgz oci://registry-1.docker.io/yonathantoledano
