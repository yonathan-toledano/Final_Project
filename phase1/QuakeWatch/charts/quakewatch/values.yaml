replicaCount: 3

image:
  repository: yonathantoledano/quakewatch
  tag: latest
  pullPolicy: Always

service:
  type: NodePort
  port: 5000
  targetPort: 5000
  nodePort: 30082

config:
  appName: QuakeWatch
  flaskEnv: production
  appPort: "5000"
  phase: phase3

secret:
  secretKey: quakewatch-phase3-secret

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

cronjob:
  enabled: true
  schedule: "*/5 * * * *"
  image: curlimages/curl:8.8.0

probes:
  readiness:
    path: /
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
  liveness:
    path: /
    initialDelaySeconds: 15
    periodSeconds: 20
    timeoutSeconds: 3
    failureThreshold: 3
