apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "quakewatch.fullname" . }}-config
  labels:
    {{- include "quakewatch.labels" . | nindent 4 }}
data:
  APP_NAME: {{ .Values.config.appName | quote }}
  FLASK_ENV: {{ .Values.config.flaskEnv | quote }}
  APP_PORT: {{ .Values.config.appPort | quote }}
  PROJECT_PHASE: {{ .Values.config.phase | quote }}
