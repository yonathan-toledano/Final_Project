apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: quakewatch
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/yonathan-toledano/Final_Project.git
    targetRevision: main
    path: charts/quakewatch
    helm:
      releaseName: quakewatch
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: quakewatch
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
